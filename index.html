<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unser Discord Server</title>
<style>
    
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(135deg, #6a11cb, #2575fc); /* lila-blauer Verlauf */
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    
    h1 {
        margin-top: 60px;
        font-size: 36px;
    }

    
    p {
        max-width: 600px;
        font-size: 20px;
        line-height: 1.5;
        padding: 0 20px;
    }

    
    .discord-button {
        background-color: black;
        color: white;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        margin-bottom: 40px;
        transition: background 0.3s;
    }

    .discord-button:hover {
        background-color: #333;
    }
</style>
</head>
<body>

<h1>Willkommen auf unserem Discord Server!</h1>
<p>
    Trete unserem Server bei, um spannende Diskussionen, Spiele und Community-Events zu erleben!  
    Tritt der Community bei, chatte mit anderen Mitgliedern und sei immer auf dem Laufenden.
</p>

<a href="https://discord.gg/ssFRZyvAQ" target="_blank" class="discord-button">Server</a>

</body>
</html>
